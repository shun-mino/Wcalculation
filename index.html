<script>
const TF = [300,100,53.2,33,20.5,12.8,7,4.5,2.3,1.1,0.53,0.3,0.125];
const GH = [300,80,40,25,8.7,3.8,1.7];

function createTable(title, list, V, L) {
    let html = `<div class="section"><h3>${title}</h3>`;
    html += `<table>
        <tr>
            <th>Ω/m</th>
            <th>電力(W)</th>
            <th>W/m</th>
        </tr>`;

    list.forEach(r => {
        const R = r * L;
        const P = V * V / R;
        const Wm = P / L;

        let redClass = "";

        // 🔥 条件分け（ここがやりたかったやつ）
        if (title === "TF" && Wm >= 35) redClass = "red";
        if (title === "GH" && Wm >= 100) redClass = "red";

        html += `
        <tr>
            <td>${r}</td>
            <td>${P.toFixed(1)}</td>
            <td class="${redClass}">${Wm.toFixed(1)}</td>
        </tr>`;
    });

    html += `</table></div>`;
    return html;
}

function calc() {
    const V = Number(document.getElementById("voltage").value);
    const L = Number(document.getElementById("length").value);

    let result = "";
    result += createTable("TF", TF, V, L);
    result += createTable("GH", GH, V, L);

    document.getElementById("output").innerHTML = result;
}
</script>
